{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Page not found</title>

  <style>
    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #fff;
      color: #333;
      text-align: center;
    }

    header {
      position: absolute;
      top: 40px;
      left: 120px;
      transform: translateX(-50%);
    }

    .logo-telix {
      height: 180px;
    }

    h1 {
      font-size: 60px;
      font-weight: bold;
      color: #0094FF;
      line-height: 1.3;
      margin-top: 140px;
      margin-bottom: 0.3rem;
    }

    .error-label {
      font-size: 20px;
      color: #bdbcbc;
      font-weight: 600;
      margin-top: -8px;
      margin-bottom: 30px;
    }

    p {
      font-size: 20px;
      color: #777;
      margin-bottom: 40px;
    }

    a.btn {
      display: inline-block;
      padding: 15px 45px;
      font-size: 1.05rem;
      background-color: #0094FF;
      color: white;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    a.btn:hover {
      background-color: #007ad9;
    }
  </style>
</head>

<body>

  <header>
    <a class="brand" href="https://www.telix.health/">
      <img
        class="logo-telix"
        src="{% static 'img/en/logo_ingles.png' %}"
        alt="Telix Logo"
      >
    </a>
  </header>

  <main>
    <h1>
      Oops... The page<br>
      address may have changed.
    </h1>

    <div class="error-label">
      (error 404)
    </div>

    <p>
      Click the button below to find the content you were looking for.
    </p>

    <a href="/treatments/" class="btn">
      Home page →
    </a>
  </main>

</body>
</html>
